<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:50px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.tips{display:flex;flex-direction:column;gap:22px}
.tip{display:flex;gap:18px;align-items:flex-start}
.tip-num{flex-shrink:0;width:44px;height:44px;border-radius:12px;background:#1A1A1A;color:#FFF;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800}
.tip-content h3{font-size:26px;color:#1A1A1A;margin-bottom:4px;font-weight:700}
.tip-content p{font-size:24px;color:#888;line-height:1.5}
.ending{margin-top:36px;padding:28px;background:#FFF;border-radius:16px;border:1px solid #F0F0EE;text-align:center}
.ending p{font-size:26px;color:#666;line-height:1.7}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">05</div>
<div class="tag">安全提醒</div>
<h2>训练安全<br>注意事项</h2>
<div class="line"></div>
<div class="tips">
<div class="tip"><div class="tip-num">1</div><div class="tip-content"><h3>始终有成人看护 👀</h3><p>所有游戏需要家长全程在场</p></div></div>
<div class="tip"><div class="tip-num">2</div><div class="tip-content"><h3>从低强度开始 📈</h3><p>先给最低刺激，观察孩子反应再逐步增加</p></div></div>
<div class="tip"><div class="tip-num">3</div><div class="tip-content"><h3>卷裹露出头部 🌬️</h3><p>毛巾卷热狗必须露出头，时间不超过2分钟</p></div></div>
<div class="tip"><div class="tip-num">4</div><div class="tip-content"><h3>饭后1小时内不做剧烈活动 🍽️</h3><p>感冒发烧时暂停，疲劳/饥饿时不练</p></div></div>
<div class="tip"><div class="tip-num">5</div><div class="tip-content"><h3>孩子说"不要"就停止 🛑</h3><p>尊重孩子的感受，强迫会适得其反</p></div></div>
</div>
<div class="ending"><p>💡 如果持续观察到多个感统失调信号<br>建议带孩子到专业机构做评估<br><br>💬 你家孩子有这些表现吗？<br>评论区聊聊，我们一起分析</p></div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
