<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:50px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.signs{display:flex;flex-direction:column;gap:24px}
.sign{display:flex;align-items:flex-start;gap:20px}
.dot{width:12px;height:12px;border-radius:50%;background:#E8742A;flex-shrink:0;margin-top:12px}
.sign p{font-size:30px;color:#333;line-height:1.6}
.sign p strong{color:#E8742A}
.sign .detail{font-size:24px;color:#888;margin-top:2px;display:block}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">04</div>
<div class="tag">避开误区</div>
<h2>感统训练<br>4个常见误区</h2>
<div class="line"></div>
<div class="signs">
<div class="sign">
<div class="dot"></div>
<p><strong>❌「感统失调长大就好了」</strong>
<span class="detail">0-6岁是关键期，4岁前干预改善率超80%，8岁后降至50%以下</span></p>
</div>
<div class="sign">
<div class="dot"></div>
<p><strong>❌「训练越猛越好」</strong>
<span class="detail">大脑有"最佳唤醒水平"，过度刺激反而适得其反，哭闹就该停</span></p>
</div>
<div class="sign">
<div class="dot"></div>
<p><strong>❌「去机构就够了」</strong>
<span class="detail">研究证实：家庭+机构配合效果是单靠机构的2-3倍</span></p>
</div>
<div class="sign">
<div class="dot"></div>
<p><strong>❌「强迫孩子做完」</strong>
<span class="detail">强迫会加重排斥，感统训练必须在孩子感到安全和愉快的前提下进行</span></p>
</div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
