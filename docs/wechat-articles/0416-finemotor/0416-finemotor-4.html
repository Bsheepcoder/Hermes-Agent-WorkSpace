<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:90px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:50px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.methods{display:flex;flex-direction:column;gap:18px}
.method{background:#FFF;border-radius:16px;padding:24px 28px;border:1px solid #F0F0EE}
.method h3{font-size:28px;color:#E8742A;margin-bottom:6px;font-weight:700}
.method p{font-size:24px;color:#666;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">03</div>
<div class="tag">实操篇</div>
<h2>6个日常小游戏<br>在家就能练<em style="color:#E8742A">灵巧小手</em></h2>
<div class="line"></div>
<div class="methods">
<div class="method"><h3>🫘 夹豆子比赛</h3><p>用儿童安全镊子夹豆子/毛球，从一个碗到另一个碗，锻炼三指捏合力</p></div>
<div class="method"><h3>🧵 串珠穿线</h3><p>准备粗线和彩色大珠子，让孩子依次穿入，训练手眼协调和专注力</p></div>
<div class="method"><h3>🎨 撕贴画创作</h3><p>把彩纸撕成小块再粘贴成画，锻炼指尖捏力和双手配合</p></div>
<div class="method"><h3>💧 滴管移水</h3><p>用滴管吸水从一个杯子移到另一个，练习手指按压的力度控制</p></div>
<div class="method"><h3>🔩 拧瓶盖配对</h3><p>收集不同大小的瓶子和盖子，让孩子拧开再拧回，练习旋转动作</p></div>
<div class="method"><h3>🧩 揉捏橡皮泥</h3><p>搓圆、压扁、捏造型，全面锻炼手指力量和灵活性</p></div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
