<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.tips{display:flex;flex-direction:column;gap:24px}
.tip{display:flex;gap:20px;align-items:flex-start}
.tip-num{flex-shrink:0;width:44px;height:44px;border-radius:12px;background:#1A1A1A;color:#FFF;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800}
.tip-content h3{font-size:28px;color:#1A1A1A;margin-bottom:4px;font-weight:700}
.tip-content p{font-size:26px;color:#888;line-height:1.5}
.ending{margin-top:40px;padding:32px;background:#FFF;border-radius:16px;border:1px solid #F0F0EE;text-align:center}
.ending p{font-size:28px;color:#666;line-height:1.6}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">04</div>
<div class="tag">注意篇</div>
<h2>训练时<br>这3点要<em style="color:#E8742A">牢记</em></h2>
<div class="line"></div>
<div class="tips">
<div class="tip"><div class="tip-num">1</div><div class="tip-content"><h3>跟随孩子的节奏</h3><p>每个孩子发育速度不同，不要跟别人家比较。难度要循序渐进，从简单到复杂。</p></div></div>
<div class="tip"><div class="tip-num">2</div><div class="tip-content"><h3>保护过度反而碍事</h3><p>怕孩子弄脏、怕受伤就不让动手，反而阻碍了精细动作发展。在安全前提下多给机会。</p></div></div>
<div class="tip"><div class="tip-num">3</div><div class="tip-content"><h3>持续训练才有效</h3><p>每天10-15分钟，比偶尔练一次效果好很多。融入日常就是最好的训练。</p></div></div>
</div>
<div class="ending"><p>🌟 精细动作训练不是"加作业"<br>而是让生活本身变成练习场<br><br>💬 你家孩子最爱玩什么手部游戏？<br>评论区聊聊吧～</p></div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
