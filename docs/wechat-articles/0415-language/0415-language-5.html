<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.signs{display:flex;flex-direction:column;gap:18px}
.sign{display:flex;align-items:center;gap:16px}
.dot{width:10px;height:10px;border-radius:50%;background:#E8742A;flex-shrink:0}
.sign p{font-size:28px;color:#333;line-height:1.5}
.note{margin-top:40px;padding:28px;background:#FFF;border-radius:16px;border:1px solid #F0F0EE}
.note h3{font-size:28px;color:#E8742A;margin-bottom:8px;font-weight:700}
.note p{font-size:26px;color:#666;line-height:1.6}
.ending{margin-top:32px;padding:24px;background:#FFF0E5;border-radius:16px;text-align:center}
.ending p{font-size:26px;color:#E8742A;line-height:1.6;font-weight:600}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">04</div>
<div class="tag">🏥 就医指引</div>
<h2>什么情况下<br>需要专业评估？</h2>
<div class="line"></div>
<div class="signs">
<div class="sign"><div class="dot"></div><p>18个月仍没有有意义的词汇</p></div>
<div class="sign"><div class="dot"></div><p>24个月词汇量少于25个</p></div>
<div class="sign"><div class="dot"></div><p>30个月不会说2词组合</p></div>
<div class="sign"><div class="dot"></div><p>36个月陌生人听不懂一半以上</p></div>
<div class="sign"><div class="dot"></div><p>任何年龄出现语言能力倒退</p></div>
<div class="sign"><div class="dot"></div><p>伴随社交互动困难</p></div>
</div>
<div class="note">
<h3>💡 重要提醒</h3>
<p>每个孩子发育节奏不同，以上是「预警信号」而非「诊断标准」。如有疑虑，建议尽早咨询专业言语治疗师，早干预效果更好。</p>
</div>
<div class="ending"><p>💬 你家宝宝多大开始说话的？<br>评论区聊聊你的经历，互相鼓励！</p></div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
