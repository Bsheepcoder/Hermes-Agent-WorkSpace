<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:50px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.stages{display:flex;flex-direction:column;gap:22px}
.stage{background:#FFF;border-radius:16px;padding:28px 32px;border:1px solid #F0F0EE;display:flex;gap:20px;align-items:flex-start}
.stage-age{flex-shrink:0;width:100px;font-size:26px;color:#E8742A;font-weight:800;text-align:center;line-height:1.3}
.stage-desc{font-size:28px;color:#333;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">01</div>
<div class="tag">发育参考</div>
<h2>0-6岁社交发展<br>各阶段长什么样？</h2>
<div class="line"></div>
<div class="stages">
<div class="stage"><div class="stage-age">0-1岁<br>婴儿期</div><div class="stage-desc">对社会性微笑有回应，会"躲猫猫"，开始认人</div></div>
<div class="stage"><div class="stage-age">1-2岁<br>幼儿期</div><div class="stage-desc">平行游戏（各玩各的但在一起），开始模仿大人</div></div>
<div class="stage"><div class="stage-age">2-3岁<br>学步期</div><div class="stage-desc">能短时间一起玩，开始学"轮流"和"等待"</div></div>
<div class="stage"><div class="stage-age">3-4岁<br>学前初期</div><div class="stage-desc">会参与简单角色扮演，开始表达"想和谁玩"</div></div>
<div class="stage"><div class="stage-age">4-6岁<br>学前后期</div><div class="stage-desc">能合作完成任务，理解规则，开始解决小冲突</div></div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
