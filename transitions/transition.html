<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mr.DerDer Transition</title>
<style>*{margin:0;padding:0}body{background:#08080c;width:1920px;height:1080px;overflow:hidden}canvas{display:block}</style>
</head>
<body>
<script type="text/javascript" src="../node_modules/three/build/three.min.js"></script>
<script>
// ══════════════════════════════════════════
// 从 URL 参数获取转场类型
// ══════════════════════════════════════════
const params = new URLSearchParams(location.search);
const TID = parseInt(params.get('t') || '1');  // 1-5
const CYCLE = parseFloat(params.get('d') || '2'); // duration in seconds

const W = 1920, H = 1080, FPS = 30;
const COUNT = 8000;

// ══════════════════════════════════════════
// 缓动
// ══════════════════════════════════════════
function easeInOut3(t){ return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function easeOut4(t){ return 1-Math.pow(1-t,4); }
function easeInOut4(t){ return t<0.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2; }
function easeOut3(t){ return 1-Math.pow(1-t,3); }
function easeOutBack(t){ const c=1.7; return 1+c*Math.pow(t-1,3)+c*Math.pow(t-1,2); }

// ══════════════════════════════════════════
// 形状生成器
// ══════════════════════════════════════════
function sphere(n, r=3){
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    const rr=r*(0.8+Math.random()*0.2);
    p[i*3]=rr*Math.sin(ph)*Math.cos(th);
    p[i*3+1]=rr*Math.sin(ph)*Math.sin(th);
    p[i*3+2]=rr*Math.cos(ph);
  }
  return p;
}

function ring(n, R=3.5, tube=0.4){
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI*2;
    const r=R+tube*Math.cos(ph)*(0.5+Math.random()*0.5);
    p[i*3]=r*Math.cos(th);
    p[i*3+1]=(Math.random()-0.5)*tube*2;
    p[i*3+2]=r*Math.sin(th);
  }
  return p;
}

function helix(n, R=2.5, h=6, turns=3){
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const t=i/n+Math.random()*0.02;
    const a=t*Math.PI*2*turns;
    const s=i%2===0?1:-1;
    const r=R+(Math.random()-0.5)*0.3;
    p[i*3]=r*Math.cos(a+s*0.5);
    p[i*3+1]=(t-0.5)*h+(Math.random()-0.5)*0.2;
    p[i*3+2]=r*Math.sin(a+s*0.5);
  }
  return p;
}

function wave(n, grid=90){
  const p=new Float32Array(n*3);
  const side=Math.ceil(Math.sqrt(n));
  for(let i=0;i<n;i++){
    const gx=(i%side)/side-0.5, gy=Math.floor(i/side)/side-0.5;
    p[i*3]=gx*10+(Math.random()-0.5)*0.15;
    p[i*3+1]=Math.sin(gx*Math.PI*4)*Math.cos(gy*Math.PI*4)*0.8+(Math.random()-0.5)*0.1;
    p[i*3+2]=gy*10+(Math.random()-0.5)*0.15;
  }
  return p;
}

function grid(n, size=7){
  const p=new Float32Array(n*3);
  const side=Math.ceil(Math.sqrt(n));
  for(let i=0;i<n;i++){
    const gx=(i%side)/side-0.5, gy=Math.floor(i/side)/side-0.5;
    p[i*3]=gx*size+(Math.random()-0.5)*0.05;
    p[i*3+1]=(Math.random()-0.5)*0.05;
    p[i*3+2]=gy*size+(Math.random()-0.5)*0.05;
  }
  return p;
}

function vortex(n, R=3, h=5){
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const t=i/n;
    const a=t*Math.PI*12;
    const r=R*(1-t*0.7)+(Math.random()-0.5)*0.3;
    p[i*3]=r*Math.cos(a);
    p[i*3+1]=(t-0.5)*h;
    p[i*3+2]=r*Math.sin(a);
  }
  return p;
}

function explode(n, spread=7){
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    const r=spread*(0.5+Math.random()*0.5);
    p[i*3]=r*Math.sin(ph)*Math.cos(th);
    p[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    p[i*3+2]=r*Math.cos(ph);
  }
  return p;
}

function tunnel(n, R=3.5, depth=8){
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const t=i/n;
    const a=Math.random()*Math.PI*2;
    const r=R*(0.8+Math.random()*0.4);
    p[i*3]=r*Math.cos(a);
    p[i*3+1]=r*Math.sin(a);
    p[i*3+2]=(t-0.5)*depth;
  }
  return p;
}

// ══════════════════════════════════════════
// 转场定义
// ══════════════════════════════════════════
const TRANSITIONS = [
  { // T1: sphere → helix
    dur: 1.8, size: 3.5,
    from: ()=>sphere(COUNT,3), to: ()=>helix(COUNT,2.5,6,3),
    c1: [0x00e5ff], c2: [0xaa00ff],
    ease: easeInOut3,
    cam: (p,t)=>({ rx:0.05*Math.sin(t*0.5), ry:p*0.3+t*0.08, zoom:1+easeOut3(p)*0.2 }),
  },
  { // T2: ring → grid
    dur: 2.0, size: 3.0,
    from: ()=>ring(COUNT,3.5,0.4), to: ()=>grid(COUNT,7),
    c1: [0xaa00ff], c2: [0xff3399],
    ease: easeInOut4,
    cam: (p,t)=>({ rx:0.1+easeInOut3(p)*0.3, ry:0.15*Math.sin(t*0.4), zoom:1 }),
  },
  { // T3: wave → vortex
    dur: 1.8, size: 3.8,
    from: ()=>wave(COUNT,90), to: ()=>vortex(COUNT,3,5),
    c1: [0xff3399], c2: [0xff8800],
    ease: easeInOut3,
    cam: (p,t)=>({ rx:0.15, ry:p*0.5+t*0.1, zoom:1.1-easeOut3(p)*0.3 }),
  },
  { // T4: helix → explode
    dur: 1.5, size: 3.2,
    from: ()=>helix(COUNT,2,5,4), to: ()=>explode(COUNT,7),
    c1: [0xff8800], c2: [0xffcc00],
    ease: easeOut4,
    cam: (p,t)=>({ rx:0.1, ry:t*0.15-p*0.2, zoom:1-easeOut4(p)*0.3 }),
  },
  { // T5: tunnel → sphere
    dur: 2.0, size: 4.0,
    from: ()=>tunnel(COUNT,3.5,8), to: ()=>sphere(COUNT,3),
    c1: [0xffcc00], c2: [0x00e5ff],
    ease: easeInOut4,
    cam: (p,t)=>({ rx:0.1+easeInOut3(p)*0.15, ry:t*0.1, zoom:1+easeOutBack(p)*0.15 }),
  },
];

const T = TRANSITIONS[TID - 1];
if (!T) { document.body.innerHTML = 'Invalid transition'; throw 'bad'; }

// ══════════════════════════════════════════
// Three.js 初始化
// ══════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08080c);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 100);
camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Bloom
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(W, H), 0.7, 0.8, 0.82
);
composer.addPass(bloom);

// ══════════════════════════════════════════
// 着色器
// ══════════════════════════════════════════
const vertSrc = `
uniform float uProgress;
uniform float uTime;
uniform float uSize;
uniform vec3 uColor1;
uniform vec3 uColor2;

attribute vec3 aTarget;
attribute float aRandom;
attribute float aOpacity;
attribute float aDelay;

varying vec3 vColor;
varying float vAlpha;

void main() {
  float delay = aDelay * 0.4;
  float progress = clamp((uProgress - delay) / (1.0 - delay), 0.0, 1.0);
  progress = 1.0 - pow(1.0 - progress, 4.0);

  vec3 pos = mix(position, aTarget, progress);

  float scatter = sin(progress * 3.14159) * (0.5 + aRandom * 0.8);
  pos += normalize(pos + vec3(0.001)) * scatter * aRandom * 1.5;

  pos.x += sin(uTime * 0.5 + aRandom * 6.28) * 0.08;
  pos.y += cos(uTime * 0.3 + aRandom * 6.28) * 0.06;
  pos.z += sin(uTime * 0.4 + aRandom * 3.14) * 0.05;

  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  gl_Position = projectionMatrix * mv;

  float sz = uSize * (0.6 + aRandom * 0.8);
  gl_PointSize = sz * (200.0 / -mv.z);

  float cMix = clamp(progress + aRandom * 0.2, 0.0, 1.0);
  vColor = mix(uColor1, uColor2, cMix);
  vAlpha = aOpacity * (1.0 - 0.3 * scatter);
}
`;

const fragSrc = `
varying vec3 vColor;
varying float vAlpha;
void main() {
  vec2 c = gl_PointCoord - vec2(0.5);
  float d = length(c);
  float alpha = smoothstep(0.5, 0.15, d) * vAlpha;
  float glow = exp(-d * 4.0) * 0.6;
  gl_FragColor = vec4(vColor * (1.0 + glow), alpha);
}
`;

// ══════════════════════════════════════════
// 创建粒子
// ══════════════════════════════════════════
const fromPos = T.from();
const toPos = T.to();
const randoms = new Float32Array(COUNT);
const opacities = new Float32Array(COUNT);
const delays = new Float32Array(COUNT);
for(let i=0;i<COUNT;i++){
  randoms[i]=Math.random();
  opacities[i]=0.4+Math.random()*0.6;
  delays[i]=Math.random();
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(fromPos, 3));
geo.setAttribute('aTarget', new THREE.BufferAttribute(toPos, 3));
geo.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
geo.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));
geo.setAttribute('aDelay', new THREE.BufferAttribute(delays, 1));

const mat = new THREE.ShaderMaterial({
  vertexShader: vertSrc,
  fragmentShader: fragSrc,
  uniforms: {
    uProgress: { value: 0 },
    uTime: { value: 0 },
    uSize: { value: T.size },
    uColor1: { value: new THREE.Color(T.c1[0]) },
    uColor2: { value: new THREE.Color(T.c2[0]) },
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const points = new THREE.Points(geo, mat);
scene.add(points);

// ══════════════════════════════════════════
// 动画循环 - 由外部控制时间
// ══════════════════════════════════════════
let globalTime = 0;

function renderFrame(timeSec) {
  globalTime = timeSec;
  const rawP = Math.min(timeSec / T.dur, 1);
  const p = T.ease(rawP);

  mat.uniforms.uProgress.value = p;
  mat.uniforms.uTime.value = timeSec;

  const cam = T.cam(p, timeSec);
  camera.position.x = Math.sin((cam.ry || 0) * Math.PI * 2) * 7;
  camera.position.y = Math.sin((cam.rx || 0) * Math.PI) * 3;
  camera.position.z = Math.cos((cam.ry || 0) * Math.PI * 2) * 7;
  if (cam.zoom) camera.position.multiplyScalar(1 / cam.zoom);
  camera.lookAt(0, 0, 0);

  composer.render();
}

// 时间控制接口（Playwright 用）
window.setRenderTime = function(sec) {
  renderFrame(sec);
};

// 自动播放模式
let startTime = null;
function autoAnimate(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 1000;
  renderFrame(elapsed);
  if (elapsed < T.dur + 0.1) {
    requestAnimationFrame(autoAnimate);
  }
}

// 如果没有外部控制则自动播放
window.startAutoPlay = function() {
  startTime = null;
  requestAnimationFrame(autoAnimate);
};

// 初始渲染
renderFrame(0);
</script>
</body>
</html>
