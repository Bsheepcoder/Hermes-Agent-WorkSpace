<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:64px;font-weight:800;color:#1A1A1A;margin-bottom:50px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:50px}
.signs{display:flex;flex-direction:column;gap:28px}
.sign{display:flex;align-items:center;gap:20px}
.dot{width:12px;height:12px;border-radius:50%;background:#E8742A;flex-shrink:0}
.sign p{font-size:34px;color:#333;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">03</div>
<div class="tag">常见误区</div>
<h2>这些"老经验"<br>可能耽误孩子</h2>
<div class="line"></div>
<div class="signs">
<div class="sign"><div class="dot"></div><p>❌ "多抱抱没事，长大了自然就会走路了"</p></div>
<div class="sign"><div class="dot"></div><p>❌ "走路越早越聪明"——强行练走伤髋关节</p></div>
<div class="sign"><div class="dot"></div><p>❌ "会坐了就不用练爬了"——跳过爬行影响协调</p></div>
<div class="sign"><div class="dot"></div><p>❌ "学步车能帮孩子学走路"——反而延缓独立行走</p></div>
<div class="sign"><div class="dot"></div><p>❌ "男孩子就是运动差"——性别不是发育落后的借口</p></div>
</div>
<div style="margin-top:50px;background:#FFF;border-radius:16px;padding:32px;border:1px solid #F0F0EE">
<p style="font-size:28px;color:#E8742A;font-weight:700;margin-bottom:8px">💡 正确观念</p>
<p style="font-size:28px;color:#666;line-height:1.6">每个孩子有自己的节奏，但有一定的窗口期。<br>如果落后同龄人超过2个月，建议尽早评估。</p>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
