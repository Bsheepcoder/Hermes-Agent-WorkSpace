<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.methods{display:flex;flex-direction:column;gap:20px}
.method{background:#FFF;border-radius:16px;padding:28px 32px;border:1px solid #F0F0EE}
.method h3{font-size:30px;color:#E8742A;margin-bottom:8px;font-weight:700}
.method p{font-size:26px;color:#666;line-height:1.6}
.method .sub{font-size:22px;color:#999;margin-top:4px}
.intro{font-size:26px;color:#888;line-height:1.6;margin-bottom:20px}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">01</div>
<div class="tag">感统科普</div>
<h2>什么是感觉统合？<br>三大核心系统</h2>
<div class="line"></div>
<div class="intro">感统理论由美国作业治疗师 Ayres 博士提出，已被美国作业治疗协会（AOTA）认可为循证方法。</div>
<div class="methods">
<div class="method">
<h3>🖐️ 触觉系统</h3>
<p>感知温度、质地、压力、疼痛</p>
<div class="sub">失调→排斥触碰/挑食/咬东西</div>
</div>
<div class="method">
<h3>🌀 前庭觉系统</h3>
<p>感知平衡、运动方向、重力</p>
<div class="sub">失调→怕高/好动/注意力差</div>
</div>
<div class="method">
<h3>💪 本体觉系统</h3>
<p>感知身体位置、力度、姿势</p>
<div class="sub">失调→动作笨拙/力度控制差</div>
</div>
<div class="method">
<h3>⚠️ 关注信号</h3>
<p>经常摔跤、坐不住、排斥衣物标签、写字太重太轻……</p>
<div class="sub">研究显示：约5-13%的儿童受感统困扰</div>
</div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
