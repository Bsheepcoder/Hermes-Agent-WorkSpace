<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:64px;font-weight:800;color:#1A1A1A;margin-bottom:50px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:50px}
.methods{display:flex;flex-direction:column;gap:24px}
.method{background:#FFF;border-radius:16px;padding:32px;border:1px solid #F0F0EE}
.method h3{font-size:32px;color:#E8742A;margin-bottom:8px;font-weight:700}
.method p{font-size:28px;color:#666;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">03</div>
<div class="tag">实操方法</div>
<h2>分步教学法<br>4步教会自理</h2>
<div class="line"></div>
<div class="methods">
<div class="method"><h3>📋 第一步：任务分解</h3><p>把"穿衣服"拆成：拿衣服→分前后→伸左手→伸右手→拉下来，一步步教</p></div>
<div class="method"><h3>✋ 第二步：手把手辅助</h3><p>初期给"全身辅助"，孩子做到哪一步就少辅助一点，逐步撤出</p></div>
<div class="method"><h3>📸 第三步：视觉提示</h3><p>在卫生间、衣橱贴流程图卡，让孩子照着图片完成每个步骤</p></div>
<div class="method"><h3>🎉 第四步：及时强化</h3><p>完成一步就夸具体行为（"你自己把袖子伸进去了！"），不要求一步到位</p></div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
