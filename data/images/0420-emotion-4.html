<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:64px;font-weight:800;color:#1A1A1A;margin-bottom:50px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:50px}
.steps{display:flex;flex-direction:column;gap:24px}
.step{background:#FFF;border-radius:16px;padding:32px;border:1px solid #F0F0EE;display:flex;gap:20px;align-items:flex-start}
.step-num{flex-shrink:0;width:48px;height:48px;border-radius:50%;background:#E8742A;color:#FFF;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800}
.step-content h3{font-size:30px;color:#1A1A1A;margin-bottom:6px;font-weight:700}
.step-content p{font-size:28px;color:#666;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">03</div>
<div class="tag">家长怎么做</div>
<h2>孩子崩溃时的<br>4步应对法</h2>
<div class="line"></div>
<div class="steps">
<div class="step"><div class="step-num">1</div><div class="step-content"><h3>🫂 先稳住自己</h3><p>深呼吸3次，告诉自己"这是学习的机会"。你的平静是最好的示范</p></div></div>
<div class="step"><div class="step-num">2</div><div class="step-content"><h3>🗣️ 帮孩子说出来</h3><p>"你现在是不是因为积木倒了，觉得很生气？"——替孩子命名情绪就是最好的辅导</p></div></div>
<div class="step"><div class="step-num">3</div><div class="step-content"><h3>🤝 肢体安抚</h3><p>蹲下来和孩子平视，轻轻拍背或拥抱。触觉输入能帮助神经系统平静下来</p></div></div>
<div class="step"><div class="step-num">4</div><div class="step-content"><h3>📝 等平静后再复盘</h3><p>"下次你想玩别人的玩具，可以说'请给我玩一下好吗？'"——教导替代行为</p></div></div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
