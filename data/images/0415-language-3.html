<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:50px}
.scene{display:flex;flex-direction:column;gap:20px}
.item{display:flex;gap:24px;align-items:flex-start}
.icon{flex-shrink:0;width:60px;height:60px;border-radius:16px;background:#FFF0E5;display:flex;align-items:center;justify-content:center;font-size:28px}
.item-content{flex:1}
.item-content h3{font-size:30px;color:#1A1A1A;margin-bottom:4px;font-weight:700}
.item-content p{font-size:26px;color:#888;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">02</div>
<div class="tag">🌅 一天中的训练</div>
<h2>从早到晚<br>每个场景都是课堂</h2>
<div class="line"></div>
<div class="scene">
<div class="item"><div class="icon">🥣</div><div class="item-content"><h3>吃饭时</h3><p>命名食物、颜色、味道：「饭热不热？」「还要不要？」</p></div></div>
<div class="item"><div class="icon">🛁</div><div class="item-content"><h3>洗澡时</h3><p>命名身体部位：「洗洗手，洗洗小脚丫」配合动作</p></div></div>
<div class="item"><div class="icon">👕</div><div class="item-content"><h3>穿衣时</h3><p>描述衣物：「穿上红色的袜子，先穿左脚」</p></div></div>
<div class="item"><div class="icon">🚗</div><div class="item-content"><h3>出门路上</h3><p>描述看到的事物：「看，小鸟在飞，飞得好高！」</p></div></div>
<div class="item"><div class="icon">📖</div><div class="item-content"><h3>睡前阅读</h3><p>对话式阅读：不只用念，多提问、多讨论，提升词汇量40%+</p></div></div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
