<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:60px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.signs{display:flex;flex-direction:column;gap:24px}
.sign{display:flex;align-items:flex-start;gap:20px}
.dot{width:12px;height:12px;border-radius:50%;background:#E8742A;flex-shrink:0;margin-top:14px}
.sign p{font-size:32px;color:#333;line-height:1.6}
.sign p strong{color:#E8742A}
.bottom-note{margin-top:40px;padding:24px 28px;background:#FFF;border-radius:12px;border:1px solid #F0F0EE}
.bottom-note p{font-size:26px;color:#888;line-height:1.6}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">02</div>
<div class="tag">信号篇</div>
<h2>这6个信号<br>提醒你关注孩子<em style="color:#E8742A">小手发育</em></h2>
<div class="line"></div>
<div class="signs">
<div class="sign"><div class="dot"></div><p><strong>4个月</strong> 仍然双手紧握拳头、拇指内扣</p></div>
<div class="sign"><div class="dot"></div><p><strong>6个月</strong> 不能主动伸手去抓面前的玩具</p></div>
<div class="sign"><div class="dot"></div><p><strong>9个月</strong> 不会用拇指和食指捏起小物品</p></div>
<div class="sign"><div class="dot"></div><p><strong>18个月</strong> 不会自主翻书页、叠2块积木</p></div>
<div class="sign"><div class="dot"></div><p><strong>2岁</strong> 不能用勺子自己吃饭，频繁掉落</p></div>
<div class="sign"><div class="dot"></div><p><strong>3岁</strong> 不会画简单线条、不会拧瓶盖</p></div>
</div>
<div class="bottom-note"><p>⚠️ 以上仅作参考，每个孩子发育节奏不同<br>如果多个信号同时出现，建议咨询专业康复师</p></div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
