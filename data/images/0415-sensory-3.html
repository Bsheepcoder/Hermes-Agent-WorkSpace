<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.card{width:100%;height:100%;background:#FAFAF8;display:flex;flex-direction:column;padding:100px 80px;position:relative}
.num{font-size:200px;font-weight:900;color:#F0F0EE;position:absolute;top:60px;right:60px;line-height:1}
.tag{display:inline-block;padding:8px 24px;border-radius:20px;background:#FFF0E5;color:#E8742A;font-size:24px;font-weight:600;letter-spacing:2px;margin-bottom:50px;align-self:flex-start}
h2{font-size:60px;font-weight:800;color:#1A1A1A;margin-bottom:40px;line-height:1.4}
.line{width:50px;height:4px;background:#E8742A;border-radius:2px;margin-bottom:40px}
.methods{display:flex;flex-direction:column;gap:18px}
.method{background:#FFF;border-radius:16px;padding:26px 30px;border:1px solid #F0F0EE}
.method h3{font-size:28px;color:#E8742A;margin-bottom:6px;font-weight:700}
.method p{font-size:25px;color:#666;line-height:1.6}
.method .step{font-size:22px;color:#999;margin-top:6px;line-height:1.5}
.ft{position:absolute;bottom:50px;left:80px;font-size:20px;color:#CCC;letter-spacing:2px}
</style></head>
<body>
<div class="card">
<div class="num">02</div>
<div class="tag">居家游戏（上）</div>
<h2>3个感统游戏<br>在家就能做</h2>
<div class="line"></div>
<div class="methods">
<div class="method">
<h3>🌭 游戏一：毛巾卷热狗</h3>
<p>【触觉+本体觉】大浴巾1条</p>
<div class="step">让孩子躺浴巾一端→卷起来（露出头）→轻按全身→孩子自己爬出来→重复3-5次</div>
</div>
<div class="method">
<h3>🛋️ 游戏二：靠垫跳跳乐</h3>
<p>【前庭觉+本体觉】枕头/靠垫3-5个</p>
<div class="step">靠垫排成一条→从一个跳到另一个→进阶：加大距离/单脚跳/头顶沙包→每次10-15分钟</div>
</div>
<div class="method">
<h3>🏕️ 游戏三：被子隧道冒险</h3>
<p>【触觉+本体觉+空间感知】被子+椅子+不同材质物品</p>
<div class="step">被子搭椅子上做隧道→放入毛绒/海绵等不同材质→孩子爬过→进阶：闭眼爬行</div>
</div>
</div>
<div class="ft">爱贝儿 · 用专业陪伴成长</div>
</div>
</body></html>
