<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit Ink v4.0 — Design Token Engine</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- WebGL Canvas Container -->
  <div id="canvas-wrap" class="si-canvas-wrap"></div>

  <!-- HUD Overlay -->
  <div id="hud-overlay" class="si-hud"></div>

  <!-- Three.js + Post-processing (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/postprocessing/OutputPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/shaders/LuminosityHighPassShader.js"></script>

  <!-- Spirit Ink Modules (order matters) -->
  <script src="js/spring.js"></script>
  <script src="js/token-engine.js"></script>
  <script src="js/renderer/shader-store.js"></script>
  <script src="js/renderer/particle.js"></script>
  <script src="js/renderer/hud.js"></script>
  <script src="js/ai/prompt-builder.js"></script>
  <script src="js/ai/response-parser.js"></script>
  <script src="providers.js"></script>
  <script src="js/app.js"></script>

  <!-- Boot -->
  <script>
  (function () {
    'use strict';

    // Load the default token pack and start the app
    fetch('packs/jarvis-v1.json')
      .then(function (res) { return res.json(); })
      .then(function (packData) {
        // The pack JSON has a nested "pack" wrapper - flatten it
        var flatPack = packData.pack || packData;

        window.app = new SpiritInk();
        window.app.init({
          canvasContainerId: 'canvas-wrap',
          hudContainerId:    'hud-overlay',
          defaultPackId:     'jarvis',
          packs: [
            {
              id:    'jarvis',
              label: 'J.A.R.V.I.S.',
              emoji: 'robot',
              data:  flatPack
            }
          ]
        });

        // Expose global helpers for console debugging
        window.activateTokens = function (tokens) {
          if (!window.app) return;
          app.tokenEngine.activateTokens(tokens);
          var allTokens = app._getAllTokensMap();
          app.hud.setTokenDisplay(tokens, allTokens);
        };
        window.switchPack = function (id) {
          if (window.app) app.switchPack(id);
        };
      })
      .catch(function (err) {
        console.error('Spirit Ink: failed to load pack', err);
        document.body.innerHTML = '<div style="color:#ff4444;padding:40px;font-family:monospace">Failed to load Spirit Ink: ' + err.message + '</div>';
      });
  })();
  </script>

</body>
</html>
