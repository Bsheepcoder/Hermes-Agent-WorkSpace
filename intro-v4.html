<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mr.DerDer Intro</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#08080c; overflow:hidden; width:1920px; height:1080px; }
canvas { display:block; position:absolute; top:0; left:0; }

/* 全屏闪白 */
#flash {
  position:absolute; inset:0; z-index:50;
  background:#fff; opacity:0; pointer-events:none;
}

/* 主标题 */
#title {
  position:absolute; z-index:10;
  left:50%; top:50%;
  transform: translate(-50%,-50%) scaleY(0.3) scaleX(1.1);
  font-family: 'Arial Black', 'Helvetica Neue', Impact, sans-serif;
  font-size: 160px; font-weight:900;
  color: #fff;
  letter-spacing: 12px;
  opacity:0;
  filter: blur(0px);
  text-shadow:
    0 0 40px rgba(255,180,40,0.0),
    0 0 80px rgba(255,140,20,0.0);
  will-change: transform, opacity, filter, text-shadow;
}

/* 副标题 */
#sub {
  position:absolute; z-index:10;
  left:50%; top:50%; margin-top:85px;
  transform: translateX(-50%) translateY(20px);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 28px; font-weight:300;
  color: rgba(255,200,100,0.0);
  letter-spacing: 18px;
  text-transform: uppercase;
  opacity:0;
  will-change: transform, opacity, color;
}

/* 装饰线 */
#line-container {
  position:absolute; z-index:10;
  left:50%; top:50%; margin-top:58px;
  transform: translateX(-50%);
  width:0; height:2px;
  background: linear-gradient(90deg, transparent, rgba(255,180,60,0.8), transparent);
  will-change: width;
}

/* 光扫条 */
#sweep {
  position:absolute; z-index:40;
  left:-300px; top:0; width:300px; height:1080px;
  background: linear-gradient(90deg, transparent, rgba(255,220,150,0.15), rgba(255,255,255,0.6), rgba(255,220,150,0.15), transparent);
  opacity:0;
  will-change: left, opacity;
}

/* 底部光晕 */
#glow {
  position:absolute; z-index:5;
  left:50%; top:50%;
  transform: translate(-50%,-50%);
  width:1200px; height:600px;
  border-radius:50%;
  background: radial-gradient(ellipse, rgba(255,160,30,0.0) 0%, transparent 70%);
  opacity:0;
  will-change: opacity, background;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="glow"></div>
<div id="sweep"></div>
<div id="line-container"></div>
<div id="title">Mr.DerDer</div>
<div id="sub">AI CREATIVE LAB</div>

<script>
const W=1920, H=1080, CYCLE=5;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const flash = document.getElementById('flash');
const glow = document.getElementById('glow');
const sweep = document.getElementById('sweep');
const title = document.getElementById('title');
const sub = document.getElementById('sub');
const lineC = document.getElementById('line-container');

// 缓动函数
function clamp(t){ return Math.max(0,Math.min(1,t)); }
function ss(a,b,t){ t=clamp((t-a)/(b-a)); return t*t*(3-2*t); }
function easeOut3(t){ t=clamp(t); return 1-Math.pow(1-t,3); }
function easeOut4(t){ t=clamp(t); return 1-Math.pow(1-t,4); }
function easeOutBack(t){ t=clamp(t); const c=1.7; return 1+c*Math.pow(t-1,3)+c*Math.pow(t-1,2); }
function easeOutElastic(t){
  t=clamp(t);
  if(t===0||t===1) return t;
  return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI)/3)+1;
}

// 粒子系统 - 冲击波碎片
const particles = [];
class Particle {
  constructor(x,y,vx,vy,size,color,life){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.size=size; this.color=color;
    this.life=life; this.maxLife=life;
    this.alive=true;
  }
  update(dt){
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vx*=0.97; this.vy*=0.97;
    this.life-=dt;
    if(this.life<=0) this.alive=false;
  }
  draw(ctx){
    const a = clamp(this.life/this.maxLife);
    const s = this.size * (0.5 + 0.5*a);
    ctx.globalAlpha = a * 0.8;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.5,s), 0, Math.PI*2);
    ctx.fill();
  }
}

function spawnBurst(x,y,count,speed,sizeRange,colors,lifeRange){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const spd = speed * (0.3+Math.random()*0.7);
    const sz = sizeRange[0]+Math.random()*(sizeRange[1]-sizeRange[0]);
    const life = lifeRange[0]+Math.random()*(lifeRange[1]-lifeRange[0]);
    const color = colors[Math.floor(Math.random()*colors.length)];
    particles.push(new Particle(x,y,
      Math.cos(angle)*spd, Math.sin(angle)*spd,
      sz, color, life
    ));
  }
}

// 背景微尘
const dust = [];
for(let i=0;i<40;i++){
  dust.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*8,
    vy: (Math.random()-0.5)*8,
    size: 0.5+Math.random()*1.5,
    alpha: 0.1+Math.random()*0.15
  });
}

const clock = { start: performance.now() };

function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const gt = (now - clock.start) / 1000;
  const t = gt % CYCLE;
  const dt = 1/60;

  // ── Canvas background ──
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#08080c';
  ctx.fillRect(0,0,W,H);

  // 背景微尘
  const dustAlpha = (t>0.3 && t<4.5) ? Math.min(ss(0.3,1,t), ss(4.5,5,t)) : 0;
  if(dustAlpha > 0){
    dust.forEach(d => {
      d.x += d.vx*dt; d.y += d.vy*dt;
      if(d.x<0) d.x=W; if(d.x>W) d.x=0;
      if(d.y<0) d.y=H; if(d.y>H) d.y=0;
      ctx.globalAlpha = d.alpha * dustAlpha;
      ctx.fillStyle = '#c8a050';
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // 粒子
  ctx.globalAlpha = 1;
  for(let i=particles.length-1; i>=0; i--){
    particles[i].update(dt);
    if(!particles[i].alive){ particles.splice(i,1); continue; }
    particles[i].draw(ctx);
  }

  // 重置周期
  if(t < 0.02){
    title.style.opacity = 0;
    title.style.transform = 'translate(-50%,-50%) scaleY(0.3) scaleX(1.1)';
    title.style.filter = 'blur(0px)';
    sub.style.opacity = 0;
    sub.style.transform = 'translateX(-50%) translateY(20px)';
    sub.style.color = 'rgba(255,200,100,0)';
    lineC.style.width = '0px';
    flash.style.opacity = 0;
    glow.style.opacity = 0;
    glow.style.background = 'radial-gradient(ellipse, rgba(255,160,30,0.0) 0%, transparent 70%)';
    sweep.style.opacity = 0;
    sweep.style.left = '-300px';
    particles.length = 0;
  }

  /*
   * Timeline (5s):
   * 0.0-1.2  暗场，微尘飘浮
   * 1.2-1.8  光扫从左到右
   * 1.8       闪白 + 标题冲击出现
   * 1.8-2.5  标题弹性稳定
   * 2.5-3.2  装饰线展开
   * 3.0-3.8  副标题浮现
   * 3.8-4.8  稳定展示
   * 4.8-5.0  快速淡出
   */

  // 1.2-1.8: 光扫
  if(t >= 1.2 && t < 1.9){
    const p = ss(1.2, 1.8, t);
    sweep.style.opacity = String(Math.min(p*2, 1) * (1 - ss(1.7, 1.9, t)));
    sweep.style.left = (-300 + p * (W + 600)) + 'px';
  }
  if(t >= 1.9) sweep.style.opacity = '0';

  // 1.8: 闪白 + 冲击
  if(t >= 1.8 && t < 2.4){
    const p = t - 1.8;
    const flashA = p < 0.05 ? 0.9 : Math.max(0, 0.9 * Math.exp(-p*12));
    flash.style.opacity = String(flashA);

    // 冲击波粒子 - 只在刚过1.8时生成
    if(p > 0 && p < 0.05){
      spawnBurst(W/2, H/2, 60, 800, [1,4],
        ['#fff','#ffcc44','#ff9922','#ffdd88'], [0.3, 1.0]);
      // 水平冲击线条
      for(let i=0;i<20;i++){
        const angle = (Math.random()-0.5)*0.3 + (Math.random()>0.5 ? 0 : Math.PI);
        const spd = 600+Math.random()*1000;
        particles.push(new Particle(W/2, H/2+(Math.random()-0.5)*60,
          Math.cos(angle)*spd, Math.sin(angle)*spd*0.3,
          0.5+Math.random(), '#fff', 0.2+Math.random()*0.5
        ));
      }
    }

    // 光晕
    const glowA = p < 0.1 ? easeOut3(p/0.1) : Math.max(0, 1-ss(0.5, 1.5, p));
    glow.style.opacity = String(glowA * 0.5);
    const r1 = Math.round(255*0.6); const g1 = Math.round(160*0.6); const b1 = Math.round(30*0.6);
    glow.style.background = `radial-gradient(ellipse, rgba(${r1},${g1},${b1},${glowA*0.3}) 0%, transparent 70%)`;
  }

  // 1.8+: 标题动画
  if(t >= 1.8){
    const p = clamp((t-1.8)/0.6);

    // 弹性缩放：从 scaleY(0.3) scaleX(1.1) 到 scale(1.0)
    const scaleY = 0.3 + 0.7 * easeOutBack(p);
    const scaleX = 1.1 - 0.1 * easeOutElastic(p);
    const blur = Math.max(0, 8 * (1 - easeOut3(Math.min(p*3,1))));
    const alpha = easeOut3(Math.min(p*4, 1));

    title.style.opacity = String(alpha);
    title.style.transform = `translate(-50%,-50%) scaleY(${scaleY}) scaleX(${scaleX})`;
    title.style.filter = `blur(${blur}px)`;

    // 发光文字阴影
    const glowI = Math.max(0, 1 - p*2); // 发光快速消退
    title.style.textShadow = 
      `0 0 ${40+glowI*40}px rgba(255,180,40,${0.3*glowI}), ` +
      `0 0 ${80+glowI*60}px rgba(255,140,20,${0.2*glowI})`;

    // 稳定后的微呼吸
    if(p >= 1 && t < 4.8){
      const breath = 1 + Math.sin(gt*2)*0.003;
      title.style.transform = `translate(-50%,-50%) scale(${breath})`;
      title.style.textShadow = 'none';
      title.style.filter = 'none';
    }
  }

  // 2.5-3.2: 装饰线展开
  if(t >= 2.5){
    const p = easeOut3(ss(2.5, 3.0, t));
    lineC.style.width = (p * 280) + 'px';
  }

  // 3.0-3.8: 副标题
  if(t >= 3.0){
    const p = easeOut3(ss(3.0, 3.6, t));
    sub.style.opacity = String(p);
    sub.style.transform = `translateX(-50%) translateY(${20*(1-p)}px)`;
    const ca = Math.round(p * 180);
    sub.style.color = `rgba(255,${180+Math.round(p*20)},${80+Math.round(p*20)},${p})`;
  }

  // 4.8-5.0: 淡出
  if(t >= 4.8){
    const p = ss(4.8, 5.0, t);
    title.style.opacity = String(1-p);
    sub.style.opacity = String(Math.max(0, 1-p));
    lineC.style.width = (280*(1-p)) + 'px';
  }
}

animate();
</script>
</body>
</html>
